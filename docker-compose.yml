services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cdb_shalom}
      POSTGRES_USER: ${POSTGRES_USER:-cdb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdb_user}"]
      interval: 10s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  celery-worker:
    build: ./backend
    command: celery -A src.tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - shared_media:/shared/media
      - shared_relatorios:/shared/relatorios
      - shared_backups:/shared/backups

  celery-beat:
    build: ./backend
    command: celery -A src.tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - celery-worker

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - shared_media:/shared/media
      - shared_relatorios:/shared/relatorios
      - shared_backups:/shared/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  whatsapp-service:
    build: ./whatsapp-service
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
      - shared_media:/shared/media
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  whatsapp_session:
  shared_media:
  shared_relatorios:
  shared_backups:
