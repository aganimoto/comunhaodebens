services:
  backend:
    build:
      context: ./backend
      target: dev
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - ./backend/dev_data:/app/dev_data
      - shared_media:/shared/media
      - shared_relatorios:/shared/relatorios
      - shared_backups:/shared/backups
    environment:
      DEV_MODE: "true"
      DEV_RELATORIOS_PATH: /app/dev_data/relatorios
      DEV_BACKUP_PATH: /app/dev_data/backups
      DATABASE_URL: postgresql+asyncpg://cdb_user:cdb_dev_pwd@postgres:5432/cdb_shalom

  celery-worker:
    build:
      context: ./backend
      target: dev
    command: watchmedo auto-restart --directory=./src --pattern=*.py --recursive -- celery -A src.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend/src:/app/src
    environment:
      DEV_MODE: "true"

  celery-beat:
    build:
      context: ./backend
      target: dev
    command: celery -A src.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - celery-worker
    environment:
      DEV_MODE: "true"

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1

  whatsapp-service:
    volumes:
      - ./whatsapp-service/src:/app/src
